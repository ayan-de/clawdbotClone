name: Build Bridge and Desktop Releases

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Node.js Components
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Prune dev dependencies
        run: pnpm prune --prod

      - name: Prepare Bridge Archive
        run: |
          pnpm --filter @orbit/bridge deploy bridge-release
          cd bridge-release
          npm pkg set scripts.start="node dist/main.js"
          
          # Create start_bridge.sh for PM2 compatibility
          cat > start_bridge.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR"
          npm start
          EOF
          chmod +x start_bridge.sh
          
          tar -czf ../bridge-linux-x64.tar.gz .

      - name: Prepare Desktop Archive
        run: |
          pnpm --filter @orbit/desktop deploy desktop-release
          cd desktop-release
          # Use tsx for the desktop as it's ESM and has missing extensions in tsc output
          npm pkg set scripts.start="npx tsx dist/index.js"
          
          # Create start_desktop.sh
          cat > start_desktop.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR"
          npm start -- "$@"
          EOF
          chmod +x start_desktop.sh
          
          tar -czf ../desktop-linux-x64.tar.gz .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-releases
          path: "*.tar.gz"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-releases

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.tar.gz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
