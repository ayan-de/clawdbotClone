name: Build Bridge and Desktop Releases

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Node.js Components
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Prune dev dependencies
        run: pnpm prune --prod

      - name: Prepare Bridge Archive
        run: |
          mkdir -p bridge-release/packages/bridge
          mkdir -p bridge-release/packages/common
          cp -r packages/bridge/dist bridge-release/packages/bridge/
          cp -r packages/bridge/package.json bridge-release/packages/bridge/
          cp -r packages/common/dist bridge-release/packages/common/
          cp -r packages/common/package.json bridge-release/packages/common/
          cp -r node_modules bridge-release/
          cp package.json pnpm-workspace.yaml bridge-release/
          
          # Create start script
          cat > bridge-release/start_bridge.sh << 'EOF'
          #!/bin/bash
          node packages/bridge/dist/main.js
          EOF
          chmod +x bridge-release/start_bridge.sh
          
          tar -czf bridge-linux-x64.tar.gz -C bridge-release .

      - name: Prepare Desktop Archive
        run: |
          mkdir -p desktop-release/packages/desktop
          mkdir -p desktop-release/packages/common
          cp -r packages/desktop/dist desktop-release/packages/desktop/
          cp -r packages/desktop/package.json desktop-release/packages/desktop/
          cp -r packages/common/dist desktop-release/packages/common/
          cp -r packages/common/package.json desktop-release/packages/common/
          cp -r node_modules desktop-release/
          cp package.json pnpm-workspace.yaml desktop-release/
          
          # Create start script
          cat > desktop-release/start_desktop.sh << 'EOF'
          #!/bin/bash
          node packages/desktop/dist/index.js "$@"
          EOF
          chmod +x desktop-release/start_desktop.sh
          
          tar -czf desktop-linux-x64.tar.gz -C desktop-release .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-releases
          path: "*.tar.gz"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-releases

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.tar.gz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
